name: Build

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to build
        required: true
        default: main
        type: string

env:
  DALAMUD_HOME: /tmp/dalamud

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud
        run: |
          mkdir -p "$DALAMUD_HOME"
          curl -fsSL https://goatcorp.github.io/dalamud-distrib/latest.zip -o /tmp/dalamud.zip
          unzip -q /tmp/dalamud.zip -d "$DALAMUD_HOME"

      - name: Restore
        run: dotnet restore AutoFrontLine.sln

      - name: Build
        run: dotnet build AutoFrontLine/AutoFrontLine.csproj -c Release --no-restore

      - name: Sync plugin manifest
        run: bash .github/scripts/sync-plugin-manifest.sh

      - name: Pack plugin zip
        run: |
          cd AutoFrontLine/bin/Release
          zip -j AutoFrontLine.zip AutoFrontLine.dll AutoFrontLine.json ECommons.dll

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoFrontLine-${{ inputs.branch }}-${{ github.sha }}
          path: AutoFrontLine/bin/Release/AutoFrontLine.zip
          retention-days: 30
