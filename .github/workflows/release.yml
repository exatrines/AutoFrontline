name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0.0). Must match AutoFrontLine.json AssemblyVersion."
        required: true
        type: string

permissions:
  contents: write

env:
  DALAMUD_HOME: /tmp/dalamud

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          submodules: recursive

      - name: Resolve version from tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Release version: $VERSION (tag $TAG)"

      - name: Verify manifest version
        run: |
          EXPECTED=$(jq -r '.AssemblyVersion' AutoFrontLine/AutoFrontLine.json)
          if [[ "$EXPECTED" != "$VERSION" ]]; then
            echo "AutoFrontLine.json AssemblyVersion ($EXPECTED) does not match tag ($VERSION)." >&2
            echo "Run: bash .github/scripts/bump-version.sh $VERSION" >&2
            exit 1
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud
        run: |
          mkdir -p "$DALAMUD_HOME"
          curl -fsSL https://goatcorp.github.io/dalamud-distrib/latest.zip -o /tmp/dalamud.zip
          unzip -q /tmp/dalamud.zip -d "$DALAMUD_HOME"

      - name: Restore and build
        run: |
          dotnet restore AutoFrontLine.sln
          dotnet build AutoFrontLine/AutoFrontLine.csproj -c Release --no-restore

      - name: Sync plugin manifest
        run: RELEASE_VERSION="$VERSION" bash .github/scripts/sync-plugin-manifest.sh

      - name: Pack plugin zip
        run: |
          cd AutoFrontLine/bin/Release
          zip -j AutoFrontLine.zip AutoFrontLine.dll AutoFrontLine.json ECommons.dll

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              --repo "${{ github.repository }}" \
              --clobber \
              AutoFrontLine/bin/Release/AutoFrontLine.zip
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "Auto FrontLine ${VERSION}" \
              --generate-notes \
              AutoFrontLine/bin/Release/AutoFrontLine.zip
          fi
